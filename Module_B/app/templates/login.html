<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Member Portal Login</title>
  <style>
    :root { --bg: #f6f2e8; --card: #fffdf8; --ink: #1f1f1f; --accent: #0f766e; --muted: #5f5f5f; }
    body { margin: 0; font-family: 'Georgia', 'Times New Roman', serif; background: radial-gradient(circle at 10% 10%, #fff4d6, var(--bg)); color: var(--ink); }
    .wrap { max-width: 480px; margin: 10vh auto; padding: 24px; }
    .card { background: var(--card); border: 1px solid #e9dcc5; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; letter-spacing: .5px; }
    label { display:block; margin:12px 0 6px; color: var(--muted); }
    input { width: 100%; padding: 10px; border: 1px solid #d8cdb9; border-radius: 10px; font-size: 1rem; }
    button { margin-top: 14px; width: 100%; padding: 11px; background: var(--accent); color: #fff; border: 0; border-radius: 10px; cursor:pointer; }
    .hint { margin-top:12px; color: var(--muted); font-size: .92rem; }
    .error { margin-top:10px; color: #b42318; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Local Member Portfolio</h1>
      <label for="username">Username</label>
      <input id="username" value="admin" />
      <label for="password">Password</label>
      <input id="password" type="password" value="admin123" />
      <button id="submit">Login</button>
      <div class="hint">Default seeded admin: admin / admin123</div>
      <div class="error" id="error"></div>
    </div>
  </div>

<script>
  document.getElementById('submit').addEventListener('click', async () => {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (res.ok) {
      window.location.href = '/portfolio';
      return;
    }
    const data = await res.json();
    document.getElementById('error').textContent = data.error || 'Login failed';
  });
</script>
</body>
</html>
