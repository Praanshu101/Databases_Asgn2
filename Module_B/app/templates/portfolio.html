<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Member Portfolio</title>
  <style>
    :root { --ink:#161616; --paper:#fcfaf4; --accent:#b45309; --panel:#fffdf7; --line:#ead9c2; }
    body { margin:0; background: linear-gradient(135deg, #f9f3e7 0%, #f4f9ef 100%); color:var(--ink); font-family:'Trebuchet MS','Gill Sans',sans-serif; }
    header { padding:16px 20px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.75); backdrop-filter: blur(4px); display:flex; justify-content:space-between; align-items:center; }
    .badge { padding:4px 10px; border-radius: 999px; border:1px solid var(--line); }
    main { max-width: 920px; margin: 24px auto; padding: 0 16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    input, textarea { width:100%; box-sizing:border-box; border:1px solid #d7c4aa; border-radius:10px; padding:9px; }
    button { background:var(--accent); color:#fff; border:0; padding:9px 12px; border-radius:10px; cursor:pointer; }
    pre { white-space: pre-wrap; background:#2d2d2d; color:#f6f6f6; padding:10px; border-radius:10px; overflow:auto; }
    @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div>Logged in as <strong>{{ username }}</strong></div>
  <div>
    <span class="badge">Role: {{ role }}</span>
    <button id="logout">Logout</button>
  </div>
</header>
<main>
  <section class="card">
    <h3>Create Portfolio</h3>
    <div class="row">
      <input id="full_name" placeholder="Full name">
      <input id="email" placeholder="Email">
      <textarea id="bio" placeholder="Bio"></textarea>
      <input id="skills" placeholder="Skills (comma separated)">
    </div>
    <button id="create">Create</button>
  </section>

  <section class="card">
    <h3>Portfolios</h3>
    <button id="refresh">Refresh</button>
    <pre id="out"></pre>
  </section>

  <section class="card">
    <h3>Unauthorized DB Changes (Admin)</h3>
    <button id="check">Check</button>
    <pre id="unauth"></pre>
  </section>
</main>

<script>
async function loadPortfolios() {
  const res = await fetch('/api/portfolios');
  const data = await res.json();
  document.getElementById('out').textContent = JSON.stringify(data, null, 2);
}

document.getElementById('create').addEventListener('click', async () => {
  const payload = {
    full_name: document.getElementById('full_name').value,
    email: document.getElementById('email').value,
    bio: document.getElementById('bio').value,
    skills: document.getElementById('skills').value
  };
  const res = await fetch('/api/portfolios', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  alert(JSON.stringify(data));
  loadPortfolios();
});

document.getElementById('refresh').addEventListener('click', loadPortfolios);
document.getElementById('check').addEventListener('click', async () => {
  const res = await fetch('/api/admin/unauthorized-changes');
  const data = await res.json();
  document.getElementById('unauth').textContent = JSON.stringify(data, null, 2);
});

document.getElementById('logout').addEventListener('click', async () => {
  await fetch('/logout', {method: 'POST'});
  window.location.href = '/';
});

loadPortfolios();
</script>
</body>
</html>
